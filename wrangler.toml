name = "cdn-manager"
main = "src/index.ts"
compatibility_date = "2024-04-03"

[vars]
CDN_DOMAIN = "cdn.xxx.com"
GLOBAL_CDN_DOMAIN = "global-cdn.xxx.com"
CORS_ORIGIN = "http://localhost:8787,https://teaven-cdn.moruteaven.qzz.io"
# Configure ADMIN_TOKEN with: npx wrangler secret put ADMIN_TOKEN

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# R2 配置
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "morutea-cdn"

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "cdn-manager"
database_id = ""

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
